<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agorà</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: #faf8f5; color: #333333; line-height: 1.8; padding: 40px 20px; }
        .container { max-width: 680px; margin: 0 auto; }
        
        header { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px solid #ebdccb; }
        .header-logo img { width: 90px; height: auto; }
        header h1 { font-size: 2.6rem; font-weight: normal; color: #1a1a1a; margin-bottom: 8px; }
        header p { font-style: italic; color: #8c8275; font-size: 1.1rem; }
        
        .social-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 35px; }
        .social-links a { color: #9c8c7c; font-size: 1.5rem; transition: color 0.2s; }
        .social-links a:hover { color: #1a1a1a; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #ffffff; border: 1px solid #ebdccb; border-radius: 4px; padding: 15px 10px; text-align: center; }
        .stat-icon { font-size: 1.2rem; margin-bottom: 5px; display: block; }
        .stat-number { font-size: 1.4rem; color: #1a1a1a; display: block; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; color: #a3988c; }
        
        .marquee-banner { border-top: 1px dashed #ebdccb; border-bottom: 1px dashed #ebdccb; padding: 10px 0; margin-bottom: 45px; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; font-style: italic; color: #8c8275; animation: marquee 25s linear infinite; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        
        footer { text-align: center; margin-top: 80px; font-size: 0.85rem; color: #a3988c; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-logo"><img src="Logo LDI.png" alt="Logo LDI"></div>
            <div class="header-text">
                <h1>Agorà</h1>
                <p>Uno spazio condiviso per parole, pensieri e riflessioni.</p>
            </div>
        </header>

        <div class="social-links">
            <a href="https://www.instagram.com/le_disabilita_invisibili/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/groups/515143972456105" target="_blank"><i class="fab fa-facebook"></i></a>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span class="stat-icon">💬</span><span class="stat-number" id="count-messages">0</span><span class="stat-label">Messaggi</span></div>
            <div class="stat-box"><span class="stat-icon">🔥</span><span class="stat-number" id="count-reactions">376</span><span class="stat-label">Reaction</span></div>
            <div class="stat-box"><span class="stat-icon">👁️</span><span class="stat-number" id="count-views">61</span><span class="stat-label">Visite</span></div>
        </div>

        <div class="marquee-banner">
            <div class="marquee-content">AGORA' DI "LE DISABILITA' INVISIBILI"! 🤍 LASCIA UN PENSIERO E CONDIVIDILO CON LA COMUNITÀ...</div>
        </div>

        <!-- Qui appare la tua Agorà dinamica -->
        <div id="giscus-container">
            <script src="https://giscus.app/client.js"
                    data-repo="ledisabilitainvisibili-cloud/agora"
                    data-repo-id="R_kgDOLh1J2A"
                    data-category="General"
                    data-category-id="DIC_kwDOLh1J2M4C-B-A"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="light"
                    data-lang="it"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>

        <footer><p>&copy; 2026 Agorà.</p></footer>
    </div>
</body>
</html>
